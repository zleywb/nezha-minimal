<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta content="telephone=no" name="format-detection">
  <title>Komari Monitor</title>
  <meta name="description" content="一个简洁的服务器监控工具。">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/semantic-ui/2.4.1/semantic.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-logos/0.17/font-logos.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="assets/nezha-minimal-1.1.20.css">
  <link rel="icon" type="image/png" href="/themes/nezha-minimal/dist/assets/favicon.png">
  <link rel="shortcut icon" type="image/png" href="/themes/nezha-minimal/dist/assets/favicon.png">
</head>
<body>
  <div id="app">
    <nav class="ui large top fixed menu nb-menu" aria-label="Primary">
      <div class="ui container ak-nav-inner">
        <a class="item ak-logo" href="/" data-route="/">
          <img class="ui" src="/themes/nezha-minimal/dist/assets/favicon.png" alt="Komari" onerror="this.onerror=null;this.src='/themes/nezha-minimal/dist/assets/logo.svg';">
        </a>
        <a class="item nav-home" href="/" data-route="/">
          <i class="home icon" aria-hidden="true"></i><span>首页</span>
        </a>
        <div class="right menu">
          <div class="item ak-auth" id="authArea">
            <a class="ui large positive nezha-primary-btn button" href="/admin">
              <i class="sign-in icon" aria-hidden="true"></i>登录
            </a>
          </div>
        </div>
      </div>
    </nav>

    <main class="nb-container">
      <div id="notice" class="ui container ak-notice" role="status" aria-live="polite"></div>
      <section id="homeView" class="ui container ak-view"></section>
    </main>

    <footer class="ui inverted vertical footer segment">
      <div class="ui center aligned is-size-7 container">
        <b>&copy; <a id="footerBrand" href="/">Komari</a></b> |
        <a href="https://github.com/komari-monitor/komari" target="_blank" rel="noreferrer">Powered by Komari</a>
        <span class="ak-footer-theme">| 主题设计 nulll zley</span>
      </div>
    </footer>
  </div>

  <script src="assets/nezha-minimal-1.1.20.js"></script>
</body>
</html>
